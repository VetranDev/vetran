<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#081424"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="0%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00FF7F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FF7F" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#glowLeft)"/>

  <!-- Scanlines -->
  <rect width="1500" height="500" fill="url(#scanlines)" opacity="0.04"/>

  <!-- Grid -->
  <g stroke="#00FF7F" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="62" x2="1500" y2="62"/>
    <line x1="0" y1="124" x2="1500" y2="124"/>
    <line x1="0" y1="186" x2="1500" y2="186"/>
    <line x1="0" y1="248" x2="1500" y2="248"/>
    <line x1="0" y1="310" x2="1500" y2="310"/>
    <line x1="0" y1="372" x2="1500" y2="372"/>
    <line x1="0" y1="434" x2="1500" y2="434"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1300" y1="0" x2="1300" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
  </g>

  <!-- Left glow orb -->
  <ellipse cx="300" cy="250" rx="350" ry="300" fill="#00FF7F" opacity="0.03"/>

  <!-- Corner brackets -->
  <g stroke="#00FF7F" stroke-width="2" fill="none" opacity="0.4">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1440,30 1470,30 1470,60"/>
    <polyline points="30,440 30,470 60,470"/>
    <polyline points="1470,440 1470,470 1440,470"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="780" y1="80" x2="780" y2="420" stroke="#00FF7F" stroke-width="1" opacity="0.15"/>

  <!-- LEFT SIDE — Shield + Logo -->
  <!-- Shield -->
  <path d="M220,110 L420,155 L420,290 Q420,390 220,440 Q20,390 20,290 L20,155 Z"
        fill="#060D18" stroke="#00FF7F" stroke-width="1.5" opacity="0.8"
        transform="translate(150, 0)"/>

  <!-- Shield inner -->
  <path d="M220,125 L405,165 L405,288 Q405,378 220,424 Q35,378 35,288 L35,165 Z"
        fill="none" stroke="#00FF7F" stroke-width="0.5" opacity="0.2"
        transform="translate(150, 0)"/>

  <!-- Big V -->
  <g filter="url(#bigGlow)" transform="translate(150,0)">
    <path d="M160,175 L220,310 L280,175"
          fill="none" stroke="#00FF7F" stroke-width="18"
          stroke-linecap="square" stroke-linejoin="miter"/>
  </g>
  <path d="M160,175 L220,310 L280,175"
        fill="none" stroke="#00FF7F" stroke-width="12"
        stroke-linecap="square" stroke-linejoin="miter"
        transform="translate(150,0)"/>

  <!-- Shield bottom dot -->
  <circle cx="370" cy="380" r="5" fill="#00FF7F" opacity="0.8"/>
  <circle cx="370" cy="380" r="10" fill="none" stroke="#00FF7F" stroke-width="1" opacity="0.4"/>

  <!-- RIGHT SIDE — Text content -->
  <!-- Classification tag -->
  <rect x="840" y="110" width="340" height="28" fill="#001A0D" stroke="#004422" stroke-width="1"/>
  <text x="855" y="129" font-family="monospace" font-size="11" fill="#009944" letter-spacing="3">▲ CLASSIFICATION: OPEN // v1.0.0</text>

  <!-- VETRAN main title -->
  <g filter="url(#bigGlow)">
    <text x="840" y="220" font-family="monospace" font-size="88" font-weight="bold"
          fill="#00FF7F" letter-spacing="8" opacity="0.9">VETRAN</text>
  </g>
  <text x="840" y="220" font-family="monospace" font-size="88" font-weight="bold"
        fill="#00FF7F" letter-spacing="8">VETRAN</text>

  <!-- Subtitle -->
  <text x="843" y="265" font-family="monospace" font-size="16"
        fill="#4A8A60" letter-spacing="4">// TRUST INFRASTRUCTURE FOR AI AGENTS</text>

  <!-- Divider -->
  <line x1="840" y1="285" x2="1440" y2="285" stroke="#004422" stroke-width="1"/>

  <!-- Three stats -->
  <g font-family="monospace" fill="#009944">
    <!-- Stat 1 -->
    <text x="840" y="330" font-size="28" font-weight="bold" fill="#00FF7F">REGISTER</text>
    <text x="840" y="352" font-size="11" letter-spacing="2" fill="#4A8A60">SIGNED IDENTITY TOKENS</text>

    <!-- Stat 2 -->
    <text x="1040" y="330" font-size="28" font-weight="bold" fill="#00FF7F">VERIFY</text>
    <text x="1040" y="352" font-size="11" letter-spacing="2" fill="#4A8A60">CAPABILITY CLEARANCE</text>

    <!-- Stat 3 -->
    <text x="1220" y="330" font-size="28" font-weight="bold" fill="#00FF7F">REVOKE</text>
    <text x="1220" y="352" font-size="11" letter-spacing="2" fill="#4A8A60">INSTANT BLACKLIST</text>
  </g>

  <!-- Bottom bar -->
  <rect x="840" y="390" width="600" height="1" fill="#004422"/>
  <text x="840" y="415" font-family="monospace" font-size="11" fill="#1E4A2A" letter-spacing="3">
    vetran.dev // @vetrandev // OAuth for AI agents
  </text>

  <!-- Radar circles (decorative, top right) -->
  <g transform="translate(1380, 120)" opacity="0.12" stroke="#00FF7F" fill="none">
    <circle cx="0" cy="0" r="60" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="20" stroke-width="0.5"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke-width="0.5"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke-width="0.5"/>
    <circle cx="15" cy="-28" r="4" fill="#00FF7F" opacity="0.6"/>
    <circle cx="-22" cy="18" r="3" fill="#00FF7F" opacity="0.4"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="1500" height="2" fill="#00FF7F" opacity="0.05">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,500" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
